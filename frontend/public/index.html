        <script>
          // Fallback pour Calendly si le widget ne charge pas
          window.addEventListener('load', function() {
            setTimeout(function() {
              const calendlyWidget = document.querySelector('.calendly-inline-widget');
              const calendlyFallback = document.querySelector('.calendly-fallback');
              
              if (calendlyWidget && calendlyFallback) {
                // Vérifier si le widget Calendly s'est chargé
                const hasCalendlyContent = calendlyWidget.querySelector('iframe') || calendlyWidget.innerHTML.trim().length > 200;
                
                if (!hasCalendlyContent) {
                  calendlyWidget.style.display = 'none';
                  calendlyFallback.style.display = 'block';
                }
              }
            }, 3000); // Attendre 3 secondes pour le chargement
          });
        </script>

        <!-- Chargement différé de Google Analytics après window.load -->
        <script>
          // Helpers pour tracking (disponibles immédiatement)
          window.dataLayer = window.dataLayer || [];
          window.trackConversion = function(conversionLabel, value) {
            if (typeof gtag !== 'undefined') {
              gtag('event', 'conversion', {
                'send_to': 'AW-XXXXXXXXXX/' + conversionLabel,
                'value': value || 0,
                'currency': 'EUR'
              });
            }
          };
          window.trackEvent = function(eventName, eventParams) {
            if (typeof gtag !== 'undefined') {
              gtag('event', eventName, eventParams || {});
            }
          };
          
          // Charger gtag après window.load
          window.addEventListener('load', function() {
            setTimeout(function() {
              const gtagScript = document.createElement('script');
              gtagScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-4QS20YLNE2';
              gtagScript.async = true;
              document.head.appendChild(gtagScript);
              
              gtagScript.onload = function() {
                function gtag(){window.dataLayer.push(arguments);}
                window.gtag = gtag;
                gtag('js', new Date());
                gtag('config', 'G-4QS20YLNE2', {
                  'send_page_view': true,
                  'anonymize_ip': true,
                  'cookie_flags': 'SameSite=None;Secure'
                });
              };
            }, 1000);
          });
        </script>
        
        <!-- Chargement différé de Calendly -->
        <script>
          window.addEventListener('load', function() {
            setTimeout(function() {
              const calendlyScript = document.createElement('script');
              calendlyScript.src = 'https://assets.calendly.com/assets/external/widget.js';
              calendlyScript.defer = true;
              document.head.appendChild(calendlyScript);
            }, 2000);
          });
          
          // Fallback pour Calendly si le widget ne charge pas
          setTimeout(function() {
            const calendlyWidget = document.querySelector('.calendly-inline-widget');
            const calendlyFallback = document.querySelector('.calendly-fallback');
            
            if (calendlyWidget && calendlyFallback) {
              const hasCalendlyContent = calendlyWidget.querySelector('iframe') || calendlyWidget.innerHTML.trim().length > 200;
              
              if (!hasCalendlyContent) {
                calendlyWidget.style.display = 'none';
                calendlyFallback.style.display = 'block';
              }
            }
          }, 5000);
        </script>
