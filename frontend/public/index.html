        <script>
          // Détection JS - retire la classe no-js si JS est activé
          document.documentElement.classList.remove('no-js');
          
          (function () {
            var key = "kapta-theme";
            var stored = null;
            try {
              stored = localStorage.getItem(key);
            } catch (e) {}

            var systemDark = false;
            try {
              systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
            } catch (e) {}

            var theme = stored === "dark" || stored === "light" ? stored : (systemDark ? "dark" : "light");
            var root = document.documentElement;
            var ua = navigator.userAgent || "";
            var isIOS = /iP(hone|ad|od)/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
            var isWebKit = /WebKit/i.test(ua);

            if (isIOS && isWebKit) {
              root.classList.add("ios-safari");
            }

            if (theme === "dark") {
              root.classList.add("dark");
            } else {
              root.classList.remove("dark");
            }
            root.setAttribute("data-theme", theme);
            root.style.colorScheme = theme;
          })();
        </script>
