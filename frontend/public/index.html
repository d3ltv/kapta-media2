        <script>
          (function () {
            var key = "kapta-theme";
            var stored = null;
            try {
              stored = localStorage.getItem(key);
            } catch (e) {}

            var systemDark = false;
            try {
              systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
            } catch (e) {}

            var theme = stored === "dark" || stored === "light" ? stored : (systemDark ? "dark" : "light");
            var root = document.documentElement;
            var ua = navigator.userAgent || "";
            var isIOS = /iP(hone|ad|od)/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
            var isWebKit = /WebKit/i.test(ua);

            if (isIOS && isWebKit) {
              root.classList.add("ios-safari");
            }

            if (theme === "dark") {
              root.classList.add("dark");
            } else {
              root.classList.remove("dark");
            }
            root.setAttribute("data-theme", theme);
            root.style.colorScheme = theme;
          })();
        </script>

        <!-- Chargement différé des scripts tiers après interaction -->
        <script>
          // Helpers pour tracking (disponibles immédiatement)
          window.dataLayer = window.dataLayer || [];
          window.trackConversion = function(conversionLabel, value) {
            if (typeof gtag !== 'undefined') {
              gtag('event', 'conversion', {
                'send_to': 'AW-XXXXXXXXXX/' + conversionLabel,
                'value': value || 0,
                'currency': 'EUR'
              });
            }
          };
          window.trackEvent = function(eventName, eventParams) {
            if (typeof gtag !== 'undefined') {
              gtag('event', eventName, eventParams || {});
            }
          };

          window.loadAfterInteraction = function(callback) {
            let loaded = false;
            const run = function() {
              if (loaded) return;
              loaded = true;
              callback();
            };

            ['scroll', 'touchstart', 'pointerdown', 'keydown', 'click'].forEach(function(eventName) {
              window.addEventListener(eventName, run, { once: true, passive: true });
            });
          };

          window.loadAfterInteraction(function() {
            const gtagScript = document.createElement('script');
            gtagScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-4QS20YLNE2';
            gtagScript.async = true;
            document.head.appendChild(gtagScript);

            gtagScript.onload = function() {
              function gtag(){window.dataLayer.push(arguments);}
              window.gtag = gtag;
              gtag('js', new Date());
              gtag('config', 'G-4QS20YLNE2', {
                'send_page_view': true,
                'anonymize_ip': true,
                'cookie_flags': 'SameSite=None;Secure'
              });
            };
          });
        </script>
